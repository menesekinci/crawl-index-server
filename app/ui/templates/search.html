{% extends "base.html" %}
{% block content %}
<div class="space-y-6 max-w-4xl mx-auto">
  <div class="flex items-center justify-between border-b border-gray-200 dark:border-gray-800 pb-4">
    <div>
      <h1 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-white">Semantic Search</h1>
      <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">Search indexed crawl content powered by local sentence-transformers and Qdrant.</p>
    </div>
  </div>

  <div class="bg-white dark:bg-gray-950 shadow-sm ring-1 ring-gray-900/5 dark:ring-white/10 rounded-xl overflow-hidden p-6">
    <form class="space-y-5" hx-post="/admin/search/results" hx-target="#results" hx-swap="innerHTML">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Query</label>
        <div class="relative mt-1 rounded-md shadow-sm">
          <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          </div>
          <input name="query" type="text" placeholder="How to authenticate API requests?" required
                 class="block w-full rounded-lg border-0 py-3 pl-10 pr-4 text-gray-900 dark:text-white ring-1 ring-inset ring-gray-300 dark:ring-gray-700 focus:ring-2 focus:ring-inset focus:ring-blue-600 sm:text-sm sm:leading-6 bg-gray-50 dark:bg-gray-900 transition-shadow">
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Limit Results</label>
          <input name="limit" type="number" value="10" min="1" max="50"
                 class="block w-full rounded-lg border-0 py-2.5 px-3 text-gray-900 dark:text-white ring-1 ring-inset ring-gray-300 dark:ring-gray-700 focus:ring-2 focus:ring-inset focus:ring-blue-600 sm:text-sm sm:leading-6 bg-gray-50 dark:bg-gray-900 transition-shadow">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Filter by Source</label>
          <select name="source_id"
                  class="block w-full rounded-lg border-0 py-2.5 px-3 text-gray-900 dark:text-white ring-1 ring-inset ring-gray-300 dark:ring-gray-700 focus:ring-2 focus:ring-inset focus:ring-blue-600 sm:text-sm sm:leading-6 bg-gray-50 dark:bg-gray-900 transition-shadow">
            <option value="">All sources</option>
            {% for source in sources %}
            <option value="{{ source.id }}">{{ source.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="pt-2">
        <button type="submit" class="w-full sm:w-auto inline-flex justify-center items-center gap-2 rounded-lg bg-blue-600 px-6 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 transition-colors">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          Search Knowledge Base
          <span class="htmx-indicator ml-2">
            <svg class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          </span>
        </button>
      </div>
    </form>
  </div>

  <div id="results" class="space-y-4">
    {% include "partials/search_results.html" %}
  </div>
</div>
{% endblock %}
